<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>E-Poslovanje Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-700 p-4 text-white shadow-lg">
        <h1 class="text-2xl font-bold">🏢 Business OS</h1>
    </nav>

    <div class="container mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Sekcija Zaposleni -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Zaposleni i Odmori</h2>
            <form action="/dodaj_zaposlenog" method="POST" class="mb-4 flex gap-2">
                <input type="text" name="ime" placeholder="Ime zaposlenog" class="border p-2 rounded w-full">
                <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Dodaj</button>
            </form>
            <ul class="divide-y">
                {% for z in zaposleni %}
                <li class="py-2 flex justify-between">
                    <span>{{ z.ime_prezime }}</span>
                    <span class="text-sm text-gray-500">{{ z.pozicija }}</span>
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Sekcija Ugovori i Odluke -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Dokumentacija (Ugovori/Odluke)</h2>
            <div class="space-y-3">
                <div class="p-3 bg-blue-50 border-l-4 border-blue-500 rounded">
                    <p class="font-bold">Ugovor_Projekat_X.pdf</p>
                    <p class="text-xs text-gray-500">Status: Potpisano e-sertifikatom</p>
                </div>
                <div class="p-3 bg-yellow-50 border-l-4 border-yellow-500 rounded">
                    <p class="font-bold">Odluka_o_radu_od_kuce.pdf</p>
                    <p class="text-xs text-gray-500">Status: U pripremi</p>
                </div>
            </div>
            <button class="mt-4 w-full bg-blue-600 text-white py-2 rounded shadow">Generiši novu odluku</button>
        </div>

    </div>
</body>
</html>
